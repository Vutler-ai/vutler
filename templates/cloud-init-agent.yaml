#cloud-config

hostname: {{NODE_HOSTNAME}}
manage_etc_hosts: true
package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates
  - ufw
  - htop

users:
  - name: vutler-agent
    gecos: Vutler Nexus Runtime
    shell: /bin/bash
    groups: [sudo]
    sudo: ['ALL=(ALL) NOPASSWD:ALL']
    lock_passwd: true

write_files:
  - path: /opt/vutler-agent/config/runtime.json
    owner: vutler-agent:vutler-agent
    permissions: '0600'
    content: |
      {{RUNTIME_CONFIG_JSON}}

  - path: /opt/vutler-agent/runtime.js
    owner: vutler-agent:vutler-agent
    permissions: '0755'
    content: |
      #!/usr/bin/env node
      'use strict';

      const fs = require('fs');
      const os = require('os');
      const http = require('http');
      const https = require('https');
      const { URL } = require('url');

      const config = JSON.parse(fs.readFileSync('/opt/vutler-agent/config/runtime.json', 'utf8'));
      const statePath = '/opt/vutler-agent/config/runtime-state.json';

      function readState() {
        try {
          return JSON.parse(fs.readFileSync(statePath, 'utf8'));
        } catch (_) {
          return {};
        }
      }

      function writeState(nextState) {
        fs.writeFileSync(statePath, JSON.stringify(nextState, null, 2));
      }

      function requestJson(method, path, payload, headers = {}) {
        return new Promise((resolve, reject) => {
          const base = new URL(config.apiBaseUrl);
          const transport = base.protocol === 'http:' ? http : https;
          const body = payload == null ? null : JSON.stringify(payload);
          const req = transport.request({
            protocol: base.protocol,
            hostname: base.hostname,
            port: base.port || (base.protocol === 'http:' ? 80 : 443),
            path,
            method,
            headers: {
              'Content-Type': 'application/json',
              ...(body ? { 'Content-Length': Buffer.byteLength(body) } : {}),
              ...headers,
            },
          }, (res) => {
            let raw = '';
            res.on('data', (chunk) => { raw += chunk; });
            res.on('end', () => {
              const text = raw.trim();
              const parsed = text ? (() => {
                try { return JSON.parse(text); } catch (_) { return { raw: text }; }
              })() : {};

              if (res.statusCode >= 400) {
                const message = parsed.error || parsed.raw || `HTTP ${res.statusCode}`;
                return reject(new Error(message));
              }

              resolve(parsed);
            });
          });

          req.on('error', reject);
          if (body) req.write(body);
          req.end();
        });
      }

      async function ensureNodeRegistered() {
        const state = readState();
        if (state.nodeId) return state.nodeId;

        const response = await requestJson(
          'POST',
          '/api/v1/nexus/register',
          {
            name: config.nodeName,
            type: 'vps',
            host: os.hostname(),
            port: config.nodePort,
            config: {
              source: 'cloud_init',
              deploymentId: config.deploymentId,
              vpsInstanceId: config.vpsInstanceId,
              agentId: config.agent.id,
            },
          },
          { Authorization: `Bearer ${config.apiKey}` }
        );

        const nextState = { ...state, nodeId: response.nodeId, workspaceId: response.workspaceId };
        writeState(nextState);
        return response.nodeId;
      }

      async function sendConnect(nodeId) {
        return requestJson(
          'POST',
          `/api/v1/nexus/${nodeId}/connect`,
          {
            status: 'online',
            api_key: config.apiKey,
            uptime: process.uptime(),
            agents: [
              {
                id: config.agent.id,
                name: config.agent.name,
                role: config.agent.role,
                status: 'online',
                vps_instance_id: config.vpsInstanceId,
              },
            ],
            memory: process.memoryUsage(),
          },
          { 'X-API-Key': config.apiKey }
        );
      }

      async function sendRuntimeHeartbeat(status, extraPayload = {}) {
        const state = readState();
        return requestJson(
          'POST',
          '/api/v1/nexus/runtime/heartbeat',
          {
            deploymentId: config.deploymentId,
            runtimeId: state.nodeId || null,
            runtimeVersion: config.runtimeVersion,
            status,
            payload: {
              nodeName: config.nodeName,
              hostname: os.hostname(),
              agentId: config.agent.id,
              workspaceId: config.workspaceId,
              vpsInstanceId: config.vpsInstanceId,
              uptimeSeconds: Math.round(process.uptime()),
              ...extraPayload,
            },
          },
          { 'X-API-Key': config.apiKey }
        );
      }

      async function boot() {
        const nodeId = await ensureNodeRegistered();
        await sendConnect(nodeId);
        await sendRuntimeHeartbeat('online');

        setInterval(async () => {
          try {
            await sendConnect(nodeId);
            await sendRuntimeHeartbeat('online');
          } catch (error) {
            console.error('[VutlerRuntime] heartbeat failed:', error.message);
          }
        }, config.heartbeatIntervalMs || 30000);
      }

      boot().catch(async (error) => {
        console.error('[VutlerRuntime] boot failed:', error);
        try {
          await sendRuntimeHeartbeat('error', { error: error.message });
        } catch (_) {}
        process.exit(1);
      });

      const shutdown = async () => {
        process.exit(0);
      };

      process.on('SIGTERM', () => { shutdown(); });
      process.on('SIGINT', () => { shutdown(); });

  - path: /etc/systemd/system/vutler-agent.service
    owner: root:root
    permissions: '0644'
    content: |
      [Unit]
      Description=Vutler VPS Runtime
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=simple
      User=vutler-agent
      Group=vutler-agent
      WorkingDirectory=/opt/vutler-agent
      ExecStart=/usr/bin/node /opt/vutler-agent/runtime.js
      Restart=always
      RestartSec=10
      StandardOutput=append:/var/log/vutler-agent.log
      StandardError=append:/var/log/vutler-agent-error.log

      [Install]
      WantedBy=multi-user.target

runcmd:
  - mkdir -p /opt/vutler-agent/config
  - chown -R vutler-agent:vutler-agent /opt/vutler-agent
  - curl -fsSL https://deb.nodesource.com/setup_{{NODEJS_VERSION}}.x | bash -
  - apt-get install -y nodejs
  - ufw --force enable
  - ufw allow ssh
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow 3100/tcp
  - systemctl daemon-reload
  - systemctl enable vutler-agent.service
  - systemctl start vutler-agent.service

final_message: "Vutler VPS runtime bootstrap finished for agent {{AGENT_ID}} (deployment {{NEXUS_DEPLOYMENT_ID}})."
