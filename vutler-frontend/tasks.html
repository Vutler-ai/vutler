<script>
let tasks = [];
const priorityColors = {98:'bg-red-500',80:'bg-orange-500',50:'bg-yellow-500',20:'bg-green-500'};
const statusLabels = {pending:'À faire',in_progress:'En cours',active:'En cours',running:'En cours',done:'Terminé',completed:'Terminé',cancelled:'Annulé'};
const statusColors = {pending:'text-yellow-400',in_progress:'text-blue-400',active:'text-blue-400',running:'text-blue-400',done:'text-green-400',completed:'text-green-400',cancelled:'text-slate-400'};
let currentView='kanban', currentFilter='all', searchQ='';

function priorityLabel(p) {
  if (p >= 90) return 'Critical';
  if (p >= 70) return 'High';
  if (p >= 40) return 'Medium';
  return 'Low';
}

function priorityDot(p) {
  const color = p >= 90 ? 'bg-red-500' : p >= 70 ? 'bg-orange-500' : p >= 40 ? 'bg-yellow-500' : 'bg-green-500';
  return '<span class="w-2 h-2 rounded-full ' + color + ' inline-block"></span>';
}

function canonicalStatus(s) {
  const x = String(s || '').toLowerCase();
  if (['in_progress','active','running','claimed'].includes(x)) return 'in_progress';
  if (['done','completed'].includes(x)) return 'done';
  if (['pending','todo'].includes(x)) return 'pending';
  return x;
}

function normalizedTitle(t) {
  return String(t?.title || '')
    .toLowerCase()
    .replace(/^\[p\d+\]\s*/, '')
    .replace(/^\[backlog\]\s*/, '')
    .replace(/^backlog\s+/, '')
    .replace(/^\[[^\]]+\]\s*/, '')
    .replace(/\(demain\)/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function filtered() {
  // Kanban should reflect active operational backlog by default:
  // include pending/in_progress/done(completed), hide failed/cancelled from active views.
  let base = tasks
    .map(t => ({ ...t, _cstatus: canonicalStatus(t.status) }))
    .filter(t => ['pending','in_progress','done'].includes(t._cstatus));

  // For active views (all/pending/in_progress), collapse duplicates by normalized title.
  if (['all','pending','in_progress'].includes(currentFilter)) {
    const grouped = new Map();
    for (const t of base) {
      if (currentFilter !== 'all' && t._cstatus !== currentFilter) continue;
      const key = normalizedTitle(t) || (t.id + '');
      const prev = grouped.get(key);
      if (!prev) {
        grouped.set(key, t);
        continue;
      }
      const prevScore = (prev.priority || 0) * 1_000_000 + Date.parse(prev.updatedAt || prev.createdAt || 0);
      const curScore = (t.priority || 0) * 1_000_000 + Date.parse(t.updatedAt || t.createdAt || 0);
      if (curScore > prevScore) grouped.set(key, t);
    }
    base = Array.from(grouped.values());
  } else if (currentFilter !== 'all') {
    base = base.filter(t => t._cstatus === currentFilter);
  }

  if (searchQ) {
    const q = searchQ.toLowerCase();
    base = base.filter(t => String(t.title || '').toLowerCase().includes(q));
  }

  return base;
}

function renderKanban() {
  const cols = [
    ['pending','À faire','border-yellow-500'],
    ['in_progress','En cours','border-blue-500'],
    ['done','Terminé','border-green-500']
  ];
  let h = '<div class="flex gap-6 h-full board-kanban">';
  
  for (const [status, label, bc] of cols) {
    const items = filtered().filter(t => (t._cstatus || canonicalStatus(t.status)) === status);
    
    h += '<div class="flex-1 min-w-[280px] flex flex-col">';
    h += '<div class="flex items-center gap-2 mb-4 pb-2 border-b-2 ' + bc + '">';
    h += '<h3 class="font-semibold text-white">' + label + '</h3>';
    h += '<span class="bg-white/5 px-2 py-0.5 rounded-full text-xs text-slate-400">' + items.length + '</span>';
    h += '</div>';
    h += '<div class="space-y-3 overflow-y-auto flex-1 pr-1">';
    
    for (const t of items) {
      h += '<div class="task-card bg-navy-lighter border border-white/5 rounded-xl p-4" onclick="openTask(\''+t.id+'\')">'; 
      h += '<div class="flex items-center gap-2 mb-2">' + priorityDot(t.priority) + '<span class="text-sm font-medium text-white flex-1 line-clamp-2">' + escHtml(t.title) + '</span></div>';
      if (t.description) h += '<p class="text-xs text-slate-500 mb-3 line-clamp-2">' + escHtml(t.description.substring(0,120)) + (t.description.length > 120 ? '...' : '') + '</p>';
      h += '<div class="flex items-center gap-2 flex-wrap text-xs text-slate-500">';
      if (t.assignee) h += '<span><i data-lucide="user" style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:2px"></i>' + escHtml(t.assignee) + '</span>';
      if (t.dueDate) h += '<span class="ml-auto"><i data-lucide="calendar" style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:2px"></i>' + formatDate(t.dueDate) + '</span>';
      h += '</div></div>';
    }
    
    if (items.length === 0) {
      h += '<div class="text-center py-8 text-slate-600 text-sm">Aucune task</div>';
    }
    h += '</div></div>';
  }
  h += '</div>';
  return h;
}

function renderList() {
  const items = filtered();
  if (items.length === 0) {
    return `
      <div class="text-center py-12 text-slate-500">
        <i data-lucide="check-square" style="width:48px;height:48px;display:block;margin:0 auto 12px;opacity:.3"></i>
        <div>Aucune task trouvée</div>
        <button onclick="openNewTask()" class="mt-4 bg-accent hover:bg-accent-hover text-white px-4 py-2 rounded-lg text-sm">
          Créer votre première task
        </button>
      </div>
    `;
  }
  
  let h = '<div class="bg-navy-light rounded-xl border border-white/5 overflow-hidden">';
  h += '<table class="w-full text-sm">';
  h += '<thead><tr class="border-b border-white/5 text-left text-slate-500">';
  h += '<th class="p-3">Titre</th>';
  h += '<th class="p-3 hidden sm:table-cell">Status</th>';
  h += '<th class="p-3 hidden md:table-cell">Priorité</th>';
  h += '<th class="p-3 hidden lg:table-cell">Assigné</th>';
  h += '<th class="p-3 hidden lg:table-cell">Échéance</th>';
  h += '</tr></thead><tbody>';
  
  for (const t of items) {
    h += '<tr class="border-b border-white/5 hover:bg-white/5 cursor-pointer" onclick="openTask(\''+t.id+'\')">';
    h += '<td class="p-3 text-white font-medium">' + escHtml(t.title) + '</td>';
    const s = t._cstatus || canonicalStatus(t.status);
    h += '<td class="p-3 hidden sm:table-cell ' + (statusColors[s]||'text-slate-400') + '">' + (statusLabels[s]||s) + '</td>';
    h += '<td class="p-3 hidden md:table-cell">' + priorityDot(t.priority) + ' <span class="text-slate-400 ml-1">' + priorityLabel(t.priority) + '</span></td>';
    h += '<td class="p-3 hidden lg:table-cell text-slate-400">' + escHtml(t.assignee||'—') + '</td>';
    h += '<td class="p-3 hidden lg:table-cell text-slate-500">' + (t.dueDate ? formatDate(t.dueDate) : '—') + '</td>';
    h += '</tr>';
  }
  h += '</tbody></table></div>';
  return h;
}

function render() {
  document.getElementById('board-container').innerHTML = currentView === 'kanban' ? renderKanban() : renderList();
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('#filters button').forEach(b => {
    b.className = b.dataset.f === f ? 'active' : '';
  });
  render();
}

function setView(v) {
  currentView = v;
  document.getElementById('vk').className = v === 'kanban' ? 'active' : '';
  document.getElementById('vl').className = v === 'list' ? 'active' : '';
  render();
}

function searchTasks(q) { 
  searchQ = q; 
  render(); 
}

function openTask(id) {
  const t = tasks.find(x => x.id == id);
  if (!t) return;
  
  document.getElementById('md-title').textContent = t.title;
  const s = t._cstatus || canonicalStatus(t.status);
  document.getElementById('md-status').innerHTML = '<span class="' + (statusColors[s]||'text-slate-400') + '">' + (statusLabels[s]||s) + '</span>';
  document.getElementById('md-priority').innerHTML = priorityDot(t.priority) + ' ' + priorityLabel(t.priority);
  document.getElementById('md-assignee').textContent = t.assignee || '—';
  document.getElementById('md-due').textContent = t.dueDate ? formatDate(t.dueDate) : '—';
  document.getElementById('md-desc').textContent = t.description || 'Aucune description.';
  
  document.getElementById('taskModal').classList.remove('hidden');
  document.getElementById('taskModal').classList.add('flex');
}

function closeModal() { 
  document.getElementById('taskModal').classList.add('hidden'); 
  document.getElementById('taskModal').classList.remove('flex'); 
}

function openNewTask() { 
  document.getElementById('newModal').classList.remove('hidden'); 
  document.getElementById('newModal').classList.add('flex'); 
}

function closeNew() { 
  document.getElementById('newModal').classList.add('hidden'); 
  document.getElementById('newModal').classList.remove('flex'); 
}

async function createTask() {
  const title = document.getElementById('new-title').value.trim();
  if (!title) {
    alert('Titre requis');
    return;
  }
  
  try {
    const taskData = {
      title,
      description: document.getElementById('new-desc').value,
      priority: parseInt(document.getElementById('new-priority').value),
      dueDate: document.getElementById('new-due').value || null,
      status: 'pending'
    };
    
    console.log('[Tasks] Creating task:', taskData);
    
    const response = await fetchWithAuth('/tasks', {
      method: 'POST',
      body: JSON.stringify(taskData)
    });
    
    console.log('[Tasks] Create response:', response);
    
    closeNew();
    await loadTasks();
    
    // Clear form
    document.getElementById('new-title').value = '';
    document.getElementById('new-desc').value = '';
    document.getElementById('new-priority').value = '50';
    document.getElementById('new-due').value = '';
    
  } catch(e) { 
    console.error('[Tasks] Create error:', e);
    alert('Erreur lors de la création: ' + e.message); 
  }
}

function escHtml(s) { 
  if (!s) return ''; 
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); 
}

function formatDate(d) { 
  if (!d) return ''; 
  try { 
    return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); 
  } catch(e) { 
    return d; 
  } 
}

function showError(message) {
  const banner = document.getElementById('error-banner');
  document.getElementById('error-message').textContent = message;
  banner.classList.remove('hidden');
}

function hideError() {
  document.getElementById('error-banner').classList.add('hidden');
}

function showEmptyState() {
  document.getElementById('board-container').innerHTML = `
    <div class="text-center py-12 text-slate-500">
      <i data-lucide="check-square" style="width:48px;height:48px;display:block;margin:0 auto 12px;opacity:.3"></i>
      <div class="text-lg font-medium mb-2">Aucune task configurée</div>
      <div class="text-sm mb-4">Créez votre première task pour commencer</div>
      <button onclick="openNewTask()" 
              class="bg-accent hover:bg-accent-hover text-white px-4 py-2 rounded-lg text-sm">
        <i data-lucide="plus" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:4px"></i>
        Nouvelle task
      </button>
    </div>
  `;
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

async function loadTasks() {
  console.log('[Tasks] Loading tasks...');
  
  try {
    hideError();
    
    const data = await fetchWithAuth('/tasks');
    console.log('[Tasks] API response:', data);
    
    if (data.tasks && Array.isArray(data.tasks)) {
      tasks = data.tasks.map(t => ({
        id: t.id || t._id,
        title: t.title || t.name || 'Sans titre',
        description: t.description || t.desc || '',
        status: normalizeStatus(t.status),
        priority: t.priority || 50,
        assignee: t.assignee || t.assigned_to || null,
        dueDate: t.dueDate || t.due_date || t.deadline || null,
        createdAt: t.created_at || t.createdAt || new Date().toISOString(),
        updatedAt: t.updated_at || t.updatedAt || new Date().toISOString()
      }));
      
      console.log('[Tasks] Processed tasks:', tasks.length);
      
      if (tasks.length > 0) {
        render();
      } else {
        showEmptyState();
      }
      
    } else if (data.success === false) {
      throw new Error(data.error || 'Invalid response format');
    } else {
      console.log('[Tasks] No tasks found');
      tasks = [];
      showEmptyState();
    }
    
  } catch(e) {
    console.error('[Tasks] Load error:', e);
    showError('Erreur de chargement: ' + e.message);
    
    // Show error state in main container
    document.getElementById('board-container').innerHTML = `
      <div class="text-center py-12 text-red-400">
        <i data-lucide="alert-circle" style="width:48px;height:48px;display:block;margin:0 auto 12px"></i>
        <div class="text-lg font-medium mb-2">Erreur de chargement</div>
        <div class="text-sm text-slate-500 mb-4">${e.message}</div>
        <button onclick="loadTasks()" 
                class="bg-accent hover:bg-accent-hover text-white px-4 py-2 rounded-lg text-sm">
          <i data-lucide="refresh-cw" style="width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:4px"></i>
          Réessayer
        </button>
      </div>
    `;
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }
}

function normalizeStatus(status) {
  if (!status) return 'pending';
  
  // Normalize different status variations
  const statusMap = {
    'todo': 'pending',
    'pending': 'pending',
    'active': 'in_progress',
    'in_progress': 'in_progress',
    'running': 'in_progress',
    'working': 'in_progress',
    'done': 'done',
    'completed': 'done',
    'finished': 'done',
    'cancelled': 'cancelled',
    'canceled': 'cancelled'
  };
  
  return statusMap[status.toLowerCase()] || status;
}

// Initialize
loadTasks();
</script>

<script>
// Theme toggle functionality
function toggleTheme() {
  const body = document.body;
  const isDark = !body.classList.contains('light-theme');
  if (isDark) {
    body.classList.add('light-theme');
    localStorage.setItem('vutler_theme', 'light');
    document.getElementById('theme-icon').textContent = '☀️';
    document.getElementById('theme-label').textContent = 'Light';
  } else {
    body.classList.remove('light-theme');
    localStorage.setItem('vutler_theme', 'dark');
    document.getElementById('theme-icon').textContent = '🌙';
    document.getElementById('theme-label').textContent = 'Dark';
  }
}

// Apply saved theme on load
(function() {
  const saved = localStorage.getItem('vutler_theme');
  if (saved === 'light') {
    document.body.classList.add('light-theme');
    const icon = document.getElementById('theme-icon');
    const label = document.getElementById('theme-label');
    if (icon) icon.textContent = '☀️';
    if (label) label.textContent = 'Light';
  }
})();
</script>
