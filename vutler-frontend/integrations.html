<!DOCTYPE html>
<html lang="en" >
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vutler — Integrations</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--bg:#0A1628;--card:#111d33;--border:rgba(255,255,255,.10);--text:#e2e8f0;--muted:#94a3b8;--accent:#6366f1;--green:#22c55e;--red:#ef4444;--yellow:#eab308}
*{margin:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:system-ui,sans-serif;display:flex;min-height:100vh}
a{color:inherit;text-decoration:none}
.badge{background:var(--red);color:#fff;font-size:11px;border-radius:99px;padding:1px 7px;margin-left:auto}
.main{flex:1;padding:28px 32px;max-width:960px;min-width:0}
h1{font-size:22px;font-weight:700;margin-bottom:6px}
.header-stats{font-size:14px;color:var(--muted);margin-bottom:24px}
.header-stats b{color:var(--text)}
.search-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:24px}
.search-box input{width:100%;background:transparent;border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-size:14px;outline:none}
.search-box input:focus{border-color:var(--accent)}
.suggestions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.sug{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;transition:.2s}
.sug:hover{background:rgba(99,102,241,.3)}
.chat-response{margin-top:14px;padding:14px;background:rgba(99,102,241,.08);border-radius:10px;font-size:14px;line-height:1.6;display:none}
.typing{display:none;margin-top:10px;font-size:14px;color:var(--muted)}
.typing span{animation:blink 1.4s infinite both}
.typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-bottom:28px}
.int-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:.2s}
.int-card:hover{border-color:var(--accent)}
.int-card .top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.int-card .icon{font-size:28px}
.int-card .name{font-weight:600;font-size:15px}
.int-card .premium{background:rgba(234,179,8,.2);color:var(--yellow);font-size:11px;padding:2px 8px;border-radius:6px;margin-left:auto}
.int-card .desc{font-size:13px;color:var(--muted);margin-bottom:12px}
.int-card .status-row{display:flex;align-items:center;justify-content:space-between}
.status-badge{font-size:12px;padding:3px 10px;border-radius:6px}
.status-badge.connected{background:rgba(34,197,94,.15);color:var(--green)}
.status-badge.available{background:rgba(148,163,184,.15);color:var(--muted)}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;cursor:pointer;transition:.2s}
.btn-connect{background:var(--accent);color:#fff}.btn-connect:hover{opacity:.85}
.btn-disconnect{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}.btn-disconnect:hover{background:rgba(239,68,68,.25)}
.btn-loading{pointer-events:none;opacity:.6}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:480px;width:90%}
.modal h3{font-size:18px;font-weight:700;margin-bottom:14px}
.modal .close{float:right;cursor:pointer;font-size:20px;color:var(--muted)}
.modal ul{list-style:none;padding:0;margin:12px 0}
.modal ul li{padding:6px 0;font-size:14px}
.modal .scopes{font-size:13px;color:var(--muted);margin:10px 0}
.modal-actions{display:flex;gap:10px;margin-top:16px}
.sidebar-link{display:flex;align-items:center;gap:.75rem;padding:.5rem .75rem;border-radius:.5rem;color:#94a3b8;font-size:.875rem;transition:all .15s}
.sidebar-link:hover{background:rgba(255,255,255,.05);color:#e2e8f0}
.sidebar-link.active{background:rgba(59,130,246,.15);color:#3B82F6}
.menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:60;background:#111d33;border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 10px;cursor:pointer;color:#e2e8f0}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:45}
@media(max-width:768px){
  aside{position:fixed!important;z-index:50!important;height:100vh!important;transform:translateX(-100%);transition:transform .3s ease}
  aside.open{transform:translateX(0)}
  .menu-toggle{display:block}
  main,.main-content{margin-left:0!important;padding-top:56px!important}
}
</style>
<script src="https://unpkg.com/lucide@latest"></script>

<body>

  <i data-lucide="menu" style="width:20px;height:20px"></i>
</button>
<div class="sidebar-overlay" onclick="document.querySelector('aside').classList.remove('open');this.style.display='none'" style="display:none"></div>
<aside id="primary-sidebar" class="w-60 bg-navy-light border-r border-white/5 flex flex-col h-screen shrink-0" style="background:#111d33">
  <div class="p-4 border-b border-white/5">

<div class="main">
<h1><i data-lucide="plug"></i> Integrations</h1>
<div class="header-stats" id="headerStats"></div>
<div class="search-box">
<input id="searchInput" placeholder="Décris ce que tu veux connecter... ex: 'Je veux synchroniser mes fichiers Google Drive'" />
<div class="suggestions" id="suggestions"></div>
<div class="typing" id="typing"><span>.</span><span>.</span><span>.</span></div>
<div class="chat-response" id="chatResponse"></div>
</div>
<div class="grid" id="grid"></div>
</div>
<div class="modal-overlay" id="detailModal">
<div class="modal" id="detailContent"></div>
</div>
<div class="modal-overlay" id="confirmModal">
<div class="modal">
<h3 id="confirmTitle"></h3>
<p style="font-size:14px;color:var(--muted);margin-bottom:16px" id="confirmText"></p>
<div class="modal-actions">
<button class="btn btn-disconnect" onclick="confirmDisconnect(true)">Oui, déconnecter</button>
<button class="btn" style="background:var(--border);color:var(--text)" onclick="confirmDisconnect(false)">Annuler</button>
</div>
</div>

<script src="/static/auth-helper-v2.js"></script>
<script>
requireAuth();

const integrations=[
{id:'gdrive',name:'Google Drive',icon:'<i data-lucide="folder" style="width:24px;height:24px"></i>',desc:'Sync and manage files from Google Drive',connected:false,premium:false,scopes:'drive.readonly, drive.file',capabilities:['Lire et indexer tous tes fichiers','Partager des docs via le chat','Créer des dossiers par projet','Recherche sémantique dans tes docs']},
{id:'slack',name:'Slack',icon:'<i data-lucide="message-square" style="width:24px;height:24px"></i>',desc:'Send and receive messages via Slack channels',connected:false,premium:false,scopes:'chat:write, channels:read',capabilities:['Poster des updates dans vos channels','Recevoir des commandes slash','Notifier les agents depuis Slack','Sync bidirectionnel des messages']},
{id:'github',name:'GitHub',icon:'<i data-lucide="github" style="width:24px;height:24px"></i>',desc:'Manage repos, PRs, and issues',connected:false,premium:false,scopes:'repo, issues, pull_requests',capabilities:['Créer et reviewer des PRs','Gérer les issues automatiquement','Déclencher des déploiements','Analyser le code pour des suggestions']},
{id:'notion',name:'Notion',icon:'<i data-lucide="file-text" style="width:24px;height:24px"></i>',desc:'Sync pages and databases from Notion',connected:false,premium:false,scopes:'pages:read, databases:read',capabilities:['Importer des pages comme contexte','Mettre à jour des bases de données','Créer des pages depuis le chat','Synchroniser les tâches']},
{id:'gmail',name:'Gmail',icon:'<i data-lucide="mail" style="width:24px;height:24px"></i>',desc:'Read and send emails via Gmail',connected:false,premium:false,scopes:'gmail.send, gmail.readonly',capabilities:['Lire et trier les emails entrants','Rédiger des réponses intelligentes','Créer des drafts pour review','Extraire les pièces jointes']},
{id:'cal',name:'Google Calendar',icon:'<i data-lucide="calendar" style="width:24px;height:24px"></i>',desc:'Manage events and scheduling',connected:false,premium:false,scopes:'calendar.events',capabilities:['Créer des événements depuis le chat','Vérifier les disponibilités','Envoyer des rappels','Planifier des réunions automatiquement']},
{id:'jira',name:'Jira',icon:'<i data-lucide="target" style="width:24px;height:24px"></i>',desc:'Track issues and sprints in Jira',connected:false,premium:true,scopes:'read:jira-work, write:jira-work',capabilities:['Créer et mettre à jour des tickets','Gérer les sprints','Reporter l\'avancement','Assigner automatiquement les tâches']},
{id:'hubspot',name:'HubSpot',icon:'<i data-lucide="magnet" style="width:24px;height:24px"></i>',desc:'CRM integration for contacts and deals',connected:false,premium:true,scopes:'contacts, deals, companies',capabilities:['Synchroniser les contacts','Suivre les deals en cours','Automatiser les follow-ups','Enrichir les profils clients']},
{id:'figma',name:'Figma',icon:'<i data-lucide="palette" style="width:24px;height:24px"></i>',desc:'Access design files and components',connected:false,premium:true,scopes:'file:read',capabilities:['Accéder aux designs en cours','Extraire les specs de composants','Notifier des changements de design','Générer des résumés de maquettes']},
{id:'stripe',name:'Stripe',icon:'<i data-lucide="credit-card" style="width:24px;height:24px"></i>',desc:'Payment and subscription management',connected:false,premium:true,scopes:'charges:read, subscriptions:read',capabilities:['Suivre les paiements entrants','Gérer les abonnements','Alerter sur les échecs de paiement','Générer des rapports financiers']},
{id:'linear',name:'Linear',icon:'<i data-lucide="ruler" style="width:24px;height:24px"></i>',desc:'Modern project tracking',connected:false,premium:true,scopes:'read, write',capabilities:['Synchroniser les issues','Automatiser les workflows','Suivre les cycles','Intégrer avec GitHub']}
];
let pendingDisconnect=null;

function getStats(){
const c=integrations.filter(x=>x.connected).length;
const a=integrations.filter(x=>!x.connected&&!x.premium).length;
const p=integrations.filter(x=>x.premium).length;
document.getElementById('headerStats').innerHTML='<b>'+c+'</b> connectées · <b>'+a+'</b> disponibles · <b>'+p+'</b> premium';
}

function render(){
getStats();
const grid=document.getElementById('grid');
grid.innerHTML='';
integrations.forEach((ig,i)=>{
const card=document.createElement('div');card.className='int-card';
card.innerHTML='<div class="top"><span class="icon">'+ig.icon+'</span><span class="name">'+ig.name+'</span>'+(ig.premium?'<span class="premium">Premium ⭐</span>':'')+'</div><div class="desc">'+ig.desc+'</div><div class="status-row"><span class="status-badge '+(ig.connected?'connected':'available')+'">'+(ig.connected?'Connected':'Available')+'</span><button class="btn '+(ig.connected?'btn-disconnect':'btn-connect')+'" data-idx="'+i+'" onclick="event.stopPropagation();toggleConnect('+i+',this)">'+(ig.connected?'Disconnect':'Connect')+'</button></div>';
card.addEventListener('click',()=>showDetail(i));
grid.appendChild(card);
});
if(typeof lucide!=='undefined') lucide.createIcons();
}

function toggleConnect(i,btn){
const ig=integrations[i];
if(ig.connected){
pendingDisconnect=i;
document.getElementById('confirmTitle').textContent='Déconnecter '+ig.name+' ?';
document.getElementById('confirmText').textContent='Les données synchronisées resteront disponibles mais ne seront plus mises à jour.';
document.getElementById('confirmModal').classList.add('show');
}else{
btn.classList.add('btn-loading');btn.innerHTML='<span class="spinner"></span>';
setTimeout(()=>{ig.connected=true;render()},1500);
}
}
function confirmDisconnect(yes){
document.getElementById('confirmModal').classList.remove('show');
if(yes&&pendingDisconnect!==null){integrations[pendingDisconnect].connected=false;render()}
pendingDisconnect=null;
}
document.getElementById('confirmModal').addEventListener('click',e=>{if(e.target===e.currentTarget){document.getElementById('confirmModal').classList.remove('show');pendingDisconnect=null}});

function showDetail(i){
const ig=integrations[i];
document.getElementById('detailContent').innerHTML='<span class="close" onclick="document.getElementById(\'detailModal\').classList.remove(\'show\')">&times;</span><h3>'+ig.icon+' '+ig.name+'</h3><p style="font-size:14px;color:var(--muted);margin-bottom:12px">'+ig.desc+'</p><div class="scopes">Scopes: '+ig.scopes+'</div><h4 style="font-size:14px;margin:12px 0 6px">Ce que Jarvis peut faire avec '+ig.name+':</h4><ul>'+ig.capabilities.map(c=>'<li>✅ '+c+'</li>').join('')+'</ul><div class="modal-actions"><button class="btn '+(ig.connected?'btn-disconnect':'btn-connect')+'" onclick="toggleConnect('+i+',this);document.getElementById(\'detailModal\').classList.remove(\'show\')">'+(ig.connected?'Disconnect':'Connect')+'</button></div>';
document.getElementById('detailModal').classList.add('show');
if(typeof lucide!=='undefined') lucide.createIcons();
}
document.getElementById('detailModal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('show')});

// Search / suggestions
const sugData=['Synchroniser mes fichiers Google Drive','Connecter mon GitHub pour les PRs','Intégrer Slack avec mes agents','Gérer mes emails avec Gmail'];
const sugsEl=document.getElementById('suggestions');
sugData.forEach(s=>{
const d=document.createElement('div');d.className='sug';d.textContent=s;
d.addEventListener('click',()=>{document.getElementById('searchInput').value=s;simulateResponse(s)});
sugsEl.appendChild(d);
});
document.getElementById('searchInput').addEventListener('keydown',e=>{
if(e.key==='Enter'&&e.target.value.trim())simulateResponse(e.target.value.trim());
});
function simulateResponse(query){
const typing=document.getElementById('typing'),resp=document.getElementById('chatResponse');
resp.style.display='none';typing.style.display='block';
setTimeout(()=>{
typing.style.display='none';resp.style.display='block';
resp.innerHTML='<strong>Jarvis</strong>: Je vais connecter cet outil pour toi. Voici ce que je vais faire:<br><br>1. ✅ Vérifier les permissions nécessaires<br>2. 🔐 Lancer le flux OAuth sécurisé<br>3. 🔄 Synchroniser les données initiales<br>4. 🧪 Tester la connexion<br>5. ✨ Configurer les automatisations recommandées<br><br><em style="color:var(--muted)">Simulation — en production, je lancerai le vrai flux OAuth.</em>';
},2000);
}

// Load real integration status from API
async function loadIntegrationStatus() {
  try {
    const data = await fetchWithAuth('/integrations');
    if (data.success && data.integrations) {
      data.integrations.forEach(apiInt => {
        const match = integrations.find(i => i.id === apiInt.id || i.name.toLowerCase() === apiInt.name.toLowerCase());
        if (match) {
          match.connected = apiInt.status === 'connected';
        }
      });
    }
  } catch(e) {
    console.log('[Integrations] API:', e.message);
  }
  render();
}

loadIntegrationStatus();

// Guard: prevent duplicated sidebar rendering (legacy + injected shell)
(function dedupeSidebar() {
  function run() {
    const primary = document.getElementById('primary-sidebar');
    const sidebars = Array.from(document.querySelectorAll('aside')).filter(el =>
      el.querySelector('.sidebar-link')
    );
    if (sidebars.length > 1) {
      const canonical = primary || sidebars[0];
      sidebars.forEach(el => { if (el !== canonical) el.remove(); });
    }

    const overlays = Array.from(document.querySelectorAll('.sidebar-overlay'));
    if (overlays.length > 1) overlays.slice(1).forEach(el => el.remove());
  }

  run();
  window.addEventListener('load', run);
  setTimeout(run, 300);
  setTimeout(run, 1000);
  const obs = new MutationObserver(run);
  obs.observe(document.documentElement, { childList: true, subtree: true });
})();
</script>

<script>
// Theme toggle functionality
function toggleTheme() {
  const body = document.body;
  const isDark = !body.classList.contains('light-theme');
  if (isDark) {
    body.classList.add('light-theme');
    localStorage.setItem('vutler_theme', 'light');
    document.getElementById('theme-icon').textContent = '☀️';
    document.getElementById('theme-label').textContent = 'Light';
  } else {
    body.classList.remove('light-theme');
    localStorage.setItem('vutler_theme', 'dark');
    document.getElementById('theme-icon').textContent = '🌙';
    document.getElementById('theme-label').textContent = 'Dark';
  }
}

// Apply saved theme on load
(function() {
  const saved = localStorage.getItem('vutler_theme');
  if (saved === 'light') {
    document.body.classList.add('light-theme');
    const icon = document.getElementById('theme-icon');
    const label = document.getElementById('theme-label');
    if (icon) icon.textContent = '☀️';
    if (label) label.textContent = 'Light';
  }
})();
</script>
