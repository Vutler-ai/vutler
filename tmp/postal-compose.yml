services:
  postal-mariadb:
    image: mariadb:10.11
    container_name: postal-mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: postal_root_2026
      MARIADB_DATABASE: postal
    volumes:
      - postal-mariadb-data:/var/lib/mysql
    networks:
      - postal-net

  postal-rabbitmq:
    image: rabbitmq:3.12-management
    container_name: postal-rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: postal
      RABBITMQ_DEFAULT_PASS: postal_rabbit_2026
    networks:
      - postal-net

  postal-web:
    image: ghcr.io/postalserver/postal:latest
    container_name: postal-web
    restart: always
    command: ['postal', 'web-server']
    depends_on: [postal-mariadb, postal-rabbitmq]
    ports: ['8082:5000']
    environment:
      BIND_ADDRESS: "0.0.0.0"
    volumes:
      - ./config/signing.key:/config/signing.key
      - ./config/postal.yml:/config/postal.yml
      - postal-storage:/opt/postal/storage
    networks:
      - postal-net
      - vutler_vutler-network

  postal-smtp:
    image: ghcr.io/postalserver/postal:latest
    container_name: postal-smtp
    restart: always
    command: ['postal', 'smtp-server']
    depends_on: [postal-mariadb, postal-rabbitmq]
    ports: ['25:25', '587:587']
    volumes:
      - ./config/signing.key:/config/signing.key
      - ./config/postal.yml:/config/postal.yml
      - postal-storage:/opt/postal/storage
    networks:
      - postal-net

  postal-worker:
    image: ghcr.io/postalserver/postal:latest
    container_name: postal-worker
    restart: always
    command: ['postal', 'worker']
    depends_on: [postal-mariadb, postal-rabbitmq]
    volumes:
      - ./config/signing.key:/config/signing.key
      - ./config/postal.yml:/config/postal.yml
      - postal-storage:/opt/postal/storage
    networks:
      - postal-net
      - vutler_vutler-network

volumes:
  postal-mariadb-data:
  postal-storage:

networks:
  postal-net:
    driver: bridge
  vutler_vutler-network:
    external: true
