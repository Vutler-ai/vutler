services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: unless-stopped
    environment:
      MAIN_URL: "http://localhost:5000"
      FRONTEND_URL: "http://localhost:5000"
      JWT_SECRET: "REDACTED_POSTIZ_JWT"
      DATABASE_URL: "postgresql://postiz:postiz@postiz-db:5432/postiz"
      REDIS_URL: "redis://postiz-redis:6379"
      BACKEND_INTERNAL_URL: "http://localhost:3000"
      IS_GENERAL: "true"
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
      NEXT_PUBLIC_BACKEND_URL: "http://localhost:5000/api"
      TEMPORAL_URL: "postiz-temporal:7233"
      TEMPORAL_ADDRESS: "postiz-temporal:7233"
      X_API_KEY: "REDACTED_POSTIZ_X_API_KEY"
      X_API_SECRET: "REDACTED_POSTIZ_X_API_SECRET"
      LINKEDIN_ID: "78vapilepdq8pq"
      LINKEDIN_SECRET: "REDACTED_LINKEDIN_CLIENT_SECRET"
      LINKEDIN_CLIENT_ID: "78vapilepdq8pq"
      LINKEDIN_CLIENT_SECRET: "REDACTED_LINKEDIN_CLIENT_SECRET"
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    ports:
      - "5000:5000"
    depends_on:
      postiz-db:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      postiz-temporal:
        condition: service_healthy

  postiz-temporal:
    image: temporalio/auto-setup:latest
    container_name: postiz-temporal
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: postiz
      POSTGRES_PWD: postiz
      POSTGRES_SEEDS: postiz-db
      SKIP_ADD_CUSTOM_SEARCH_ATTRIBUTES: "true"
      DYNAMIC_CONFIG_FILE_PATH: "config/dynamicconfig/docker.yaml"
    volumes:
      - ./temporal-dynamic-config.yaml:/etc/temporal/config/dynamicconfig/docker.yaml
    depends_on:
      postiz-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tctl --address $(hostname -i):7233 cluster health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s

  postiz-db:
    image: postgres:17-alpine
    container_name: postiz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: postiz
      POSTGRES_DB: postiz
    volumes:
      - postiz-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz"]
      interval: 10s
      timeout: 5s
      retries: 5

  postiz-redis:
    image: redis:7-alpine
    container_name: postiz-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postiz-redis-data:/data

volumes:
  postiz-config:
  postiz-uploads:
  postiz-pgdata:
  postiz-redis-data:
