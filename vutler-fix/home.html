<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vutler - Home</title>
    <link rel="icon" href="https://app.vutler.ai/assets/favicon_512.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/vutler/styles.css">
    <style>
        .vutler-topnav{background:#0d1117;border-bottom:1px solid rgba(255,255,255,0.06);padding:8px 24px;font-family:Inter,sans-serif;font-size:13px;display:flex;gap:16px;align-items:center}
        .vutler-topnav a{color:rgba(255,255,255,0.5);text-decoration:none;transition:color .15s}
        .vutler-topnav a:hover{color:rgba(255,255,255,0.8)}
        .vutler-topnav a.active{color:#3b82f6;font-weight:600}
        .vutler-topnav .sep{color:rgba(255,255,255,0.15)}
        body.home-page{display:block;background:#0a0e1a;color:#f1f5f9;font-family:Inter,sans-serif;margin:0}
        .main-content{max-width:800px;margin:0 auto;padding:40px 24px}
        .welcome-section h1{font-size:28px;font-weight:700;margin-bottom:8px}
        .welcome-text{color:#94a3b8;font-size:15px;margin-bottom:32px}
        .quick-actions{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
        .action-card{background:#111827;border:1px solid #1e293b;border-radius:12px;padding:24px;cursor:pointer;transition:border-color .15s}
        .action-card:hover{border-color:#334155}
        .action-icon{font-size:32px;margin-bottom:12px}
        .action-card h3{font-size:16px;font-weight:600;margin-bottom:4px}
        .action-card p{font-size:13px;color:#64748b}
    </style>
</head>
<body class="home-page">
    <nav class="vutler-topnav">
        <a href="/home" class="active">Home</a><span class="sep">/</span>
        <a href="/channel/general">Chat</a><span class="sep">/</span>
        <a href="/knowledge">Knowledge</a><span class="sep">/</span>
        <a href="/memory">Memory</a><span class="sep">/</span>
        <a href="/admin">Settings</a>
    </nav>
    <div class="main-content">
        <div class="welcome-section">
            <h1>Welcome to Vutler</h1>
            <p class="welcome-text">Your enterprise AI communication platform</p>
            <div class="quick-actions">
                <div class="action-card" onclick="window.location.href='/channel/general'">
                    <div class="action-icon">💬</div>
                    <h3>Start Chatting</h3>
                    <p>Join channels and connect with your team</p>
                </div>
                <div class="action-card" onclick="window.location.href='/knowledge'">
                    <div class="action-icon">📚</div>
                    <h3>Knowledge Base</h3>
                    <p>Manage your agents' knowledge documents</p>
                </div>
                <div class="action-card" onclick="window.location.href='/admin'">
                    <div class="action-icon">⚙️</div>
                    <h3>Settings</h3>
                    <p>Manage your Vutler workspace</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
