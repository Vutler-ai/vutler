<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vutler Settings - LLM Providers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0A1628;
      color: #E2E8F0;
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background: #0F1E34;
      border-bottom: 1px solid #1E3A5F;
      padding: 20px 0;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #3B82F6;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #94A3B8;
      font-size: 14px;
    }

    h2 {
      font-size: 22px;
      color: #E2E8F0;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .tabs {
      display: flex;
      gap: 15px;
      margin-bottom: 30px;
      border-bottom: 2px solid #1E3A5F;
      padding-bottom: 10px;
    }

    .tab {
      padding: 10px 20px;
      background: transparent;
      border: none;
      color: #94A3B8;
      cursor: pointer;
      font-weight: 500;
      font-size: 15px;
      transition: all 0.2s;
      border-radius: 6px 6px 0 0;
    }

    .tab:hover {
      color: #3B82F6;
      background: #0F1E34;
    }

    .tab.active {
      color: #3B82F6;
      background: #0F1E34;
      border-bottom: 2px solid #3B82F6;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.3s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .provider-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .provider-card {
      background: #0F1E34;
      border: 1px solid #1E3A5F;
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s;
      position: relative;
    }

    .provider-card:hover {
      border-color: #3B82F6;
      box-shadow: 0 4px 20px rgba(59, 130, 246, 0.15);
    }

    .provider-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .provider-icon {
      font-size: 32px;
    }

    .provider-info h3 {
      font-size: 18px;
      color: #E2E8F0;
      margin-bottom: 4px;
    }

    .provider-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #94A3B8;
    }

    .status-connected {
      color: #10B981;
    }

    .status-not-configured {
      color: #F59E0B;
    }

    .provider-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .toggle-switch {
      position: relative;
      width: 50px;
      height: 26px;
      margin-left: auto;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #334155;
      transition: 0.3s;
      border-radius: 26px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background-color: #3B82F6;
    }

    input:checked + .toggle-slider:before {
      transform: translateX(24px);
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: #3B82F6;
      color: white;
    }

    .btn-primary:hover {
      background: #2563EB;
    }

    .btn-secondary {
      background: #1E3A5F;
      color: #E2E8F0;
    }

    .btn-secondary:hover {
      background: #2D4A6F;
    }

    .btn-danger {
      background: #EF4444;
      color: white;
    }

    .btn-danger:hover {
      background: #DC2626;
    }

    .btn-success {
      background: #10B981;
      color: white;
    }

    .btn-success:hover {
      background: #059669;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 22, 40, 0.8);
      backdrop-filter: blur(4px);
    }

    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.3s;
    }

    .modal-content {
      background: #0F1E34;
      border: 1px solid #1E3A5F;
      border-radius: 12px;
      padding: 30px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 22px;
    }

    .modal-close {
      background: none;
      border: none;
      color: #94A3B8;
      font-size: 24px;
      cursor: pointer;
      padding: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      color: #E2E8F0;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #E2E8F0;
      font-weight: 500;
      font-size: 14px;
    }

    .form-group input[type="text"],
    .form-group input[type="password"] {
      width: 100%;
      padding: 12px 14px;
      background: #0A1628;
      border: 1px solid #1E3A5F;
      border-radius: 8px;
      color: #E2E8F0;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #3B82F6;
    }

    .form-group input::placeholder {
      color: #64748B;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .checkbox-group label {
      margin: 0;
      cursor: pointer;
      font-size: 14px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #EF4444;
      color: #FCA5A5;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid #10B981;
      color: #6EE7B7;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .models-table {
      background: #0F1E34;
      border: 1px solid #1E3A5F;
      border-radius: 12px;
      overflow: hidden;
      margin-top: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #0A1628;
    }

    th {
      text-align: left;
      padding: 16px;
      color: #94A3B8;
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    td {
      padding: 16px;
      border-top: 1px solid #1E3A5F;
      color: #E2E8F0;
      font-size: 14px;
    }

    tbody tr:hover {
      background: rgba(59, 130, 246, 0.05);
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-free {
      background: rgba(148, 163, 184, 0.2);
      color: #94A3B8;
    }

    .badge-pro {
      background: rgba(59, 130, 246, 0.2);
      color: #60A5FA;
    }

    .badge-premium {
      background: rgba(168, 85, 247, 0.2);
      color: #C084FC;
    }

    .provider-group {
      color: #94A3B8;
      font-size: 13px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #94A3B8;
    }

    .spinner {
      border: 3px solid #1E3A5F;
      border-top: 3px solid #3B82F6;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #0F1E34;
      border: 1px solid #3B82F6;
      color: #E2E8F0;
      padding: 16px 20px;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      z-index: 2000;
      animation: slideIn 0.3s;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .test-status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
    }

    .test-status.testing {
      background: rgba(59, 130, 246, 0.1);
      color: #60A5FA;
    }

    .test-status.success {
      background: rgba(16, 185, 129, 0.1);
      color: #6EE7B7;
    }

    .test-status.error {
      background: rgba(239, 68, 68, 0.1);
      color: #FCA5A5;
    }

    @media (max-width: 768px) {
      .provider-grid {
        grid-template-columns: 1fr;
      }

      .modal-content {
        width: 95%;
        padding: 20px;
      }

      table {
        font-size: 13px;
      }

      th, td {
        padding: 12px 8px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>⚙️ Settings</h1>
      <p class="subtitle">Manage LLM providers and models</p>
    </div>
  </header>

  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('providers')">LLM Providers</button>
      <button class="tab" onclick="switchTab('models')">Available Models</button>
    </div>

    <!-- LLM Providers Tab -->
    <div id="providersTab" class="tab-content active">
      <h2>LLM Providers</h2>
      <div id="providersLoading" class="loading">
        <div class="spinner"></div>
        <p>Loading providers...</p>
      </div>
      <div id="providersContent" style="display: none;">
        <div class="provider-grid" id="providerGrid"></div>
      </div>
    </div>

    <!-- Available Models Tab -->
    <div id="modelsTab" class="tab-content">
      <h2>Available Models</h2>
      <div id="modelsLoading" class="loading">
        <div class="spinner"></div>
        <p>Loading models...</p>
      </div>
      <div id="modelsContent" style="display: none;">
        <div class="models-table">
          <table>
            <thead>
              <tr>
                <th>Model Name</th>
                <th>Provider</th>
                <th>Tier</th>
                <th>Context Window</th>
              </tr>
            </thead>
            <tbody id="modelsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Configure Provider Modal -->
  <div id="configureModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Configure Provider</h2>
        <button class="modal-close" onclick="closeModal('configureModal')">&times;</button>
      </div>
      <div id="modalError"></div>
      <form id="configureForm">
        <input type="hidden" id="providerId">
        
        <div class="form-group">
          <label for="apiKey">API Key *</label>
          <input type="password" id="apiKey" placeholder="sk-..." required>
        </div>

        <div class="form-group">
          <label for="baseUrl">Base URL</label>
          <input type="text" id="baseUrl" placeholder="https://api.openai.com/v1">
          <small style="color: #64748B; font-size: 12px; margin-top: 4px; display: block;">
            Leave default for official API, or use custom URL for self-hosted
          </small>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="isDefault">
          <label for="isDefault">Set as default provider</label>
        </div>

        <div id="testStatus"></div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="testConnection()">Test Connection</button>
          <button type="button" class="btn btn-secondary" onclick="closeModal('configureModal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let providersData = [];
    let modelsData = [];

    // Provider configs with icons and default URLs
    const PROVIDER_CONFIG = {
      'openai': { icon: '🟢', name: 'OpenAI', baseUrl: 'https://api.openai.com/v1' },
      'anthropic': { icon: '🟣', name: 'Anthropic', baseUrl: 'https://api.anthropic.com' },
      'openrouter': { icon: '🔵', name: 'OpenRouter', baseUrl: 'https://openrouter.ai/api/v1' },
      'mistral': { icon: '🟠', name: 'Mistral', baseUrl: 'https://api.mistral.ai/v1' },
      'groq': { icon: '⚡', name: 'Groq', baseUrl: 'https://api.groq.com/openai/v1' }
    };

    // fetchWithAuth helper
    async function fetchWithAuth(endpoint, options = {}) {
      const token = localStorage.getItem('vutler_token');
      if (!token) {
        window.location.href = '/login';
        throw new Error('No auth token');
      }

      const res = await fetch(`${API_BASE}${endpoint}`, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
          ...options.headers
        }
      });

      if (res.status === 401) {
        localStorage.removeItem('vutler_token');
        window.location.href = '/login';
        throw new Error('Unauthorized');
      }

      const data = await res.json();
      
      if (!res.ok) {
        throw new Error(data.error || `HTTP ${res.status}`);
      }

      return data;
    }

    // Tab switching
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(tabName + 'Tab').classList.add('active');

      if (tabName === 'models' && modelsData.length === 0) {
        loadModels();
      }
    }

    // Load providers
    async function loadProviders() {
      try {
        const data = await fetchWithAuth('/api/v1/llm/providers');
        
        if (data.success) {
          providersData = data.data || [];
          renderProviders();
          document.getElementById('providersLoading').style.display = 'none';
          document.getElementById('providersContent').style.display = 'block';
        }
      } catch (err) {
        console.error('Load providers error:', err);
        showToast('Failed to load providers: ' + err.message, 'error');
        document.getElementById('providersLoading').innerHTML = 
          `<p style="color: #EF4444;">Error: ${err.message}</p>`;
      }
    }

    // Render providers
    function renderProviders() {
      const grid = document.getElementById('providerGrid');
      
      // Show all possible providers, merge with configured ones
      const allProviders = Object.keys(PROVIDER_CONFIG);
      
      grid.innerHTML = allProviders.map(providerId => {
        const config = PROVIDER_CONFIG[providerId];
        const provider = providersData.find(p => p.provider === providerId) || {};
        const isConfigured = !!provider.id;
        const isEnabled = provider.enabled !== false;
        
        return `
          <div class="provider-card">
            <div class="provider-header">
              <div class="provider-icon">${config.icon}</div>
              <div class="provider-info" style="flex: 1;">
                <h3>${config.name}</h3>
                <div class="provider-status ${isConfigured ? 'status-connected' : 'status-not-configured'}">
                  ${isConfigured ? '✅ Connected' : '⚠️ Not configured'}
                </div>
              </div>
              ${isConfigured ? `
                <label class="toggle-switch">
                  <input type="checkbox" ${isEnabled ? 'checked' : ''} 
                         onchange="toggleProvider('${provider.id}', this.checked)">
                  <span class="toggle-slider"></span>
                </label>
              ` : ''}
            </div>
            <div class="provider-actions">
              <button class="btn ${isConfigured ? 'btn-secondary' : 'btn-primary'}" 
                      onclick="configureProvider('${providerId}', ${isConfigured ? "'" + provider.id + "'" : 'null'})">
                ${isConfigured ? 'Reconfigure' : 'Configure'}
              </button>
              ${isConfigured ? `
                <button class="btn btn-danger" onclick="deleteProvider('${provider.id}')">
                  Delete
                </button>
              ` : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    // Configure provider
    function configureProvider(providerId, providerDbId) {
      const config = PROVIDER_CONFIG[providerId];
      const provider = providerDbId ? providersData.find(p => p.id === providerDbId) : null;
      
      document.getElementById('modalTitle').textContent = 
        `Configure ${config.name}`;
      document.getElementById('providerId').value = providerId;
      document.getElementById('apiKey').value = provider?.api_key || '';
      document.getElementById('baseUrl').value = provider?.base_url || config.baseUrl;
      document.getElementById('isDefault').checked = provider?.is_default || false;
      document.getElementById('testStatus').innerHTML = '';
      document.getElementById('modalError').innerHTML = '';
      
      openModal('configureModal');
    }

    // Save provider config
    document.getElementById('configureForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const providerId = document.getElementById('providerId').value;
      const apiKey = document.getElementById('apiKey').value;
      const baseUrl = document.getElementById('baseUrl').value;
      const isDefault = document.getElementById('isDefault').checked;
      
      const existing = providersData.find(p => p.provider === providerId);
      const method = existing ? 'PUT' : 'POST';
      const endpoint = existing 
        ? `/api/v1/llm/providers/${existing.id}`
        : '/api/v1/llm/providers';
      
      try {
        const data = await fetchWithAuth(endpoint, {
          method,
          body: JSON.stringify({
            provider: providerId,
            api_key: apiKey,
            base_url: baseUrl || PROVIDER_CONFIG[providerId].baseUrl,
            is_default: isDefault,
            enabled: true
          })
        });
        
        if (data.success) {
          closeModal('configureModal');
          showToast('Provider configured successfully', 'success');
          loadProviders();
        }
      } catch (err) {
        document.getElementById('modalError').innerHTML = 
          `<div class="error-message">${err.message}</div>`;
      }
    });

    // Test connection
    async function testConnection() {
      const providerId = document.getElementById('providerId').value;
      const apiKey = document.getElementById('apiKey').value;
      const baseUrl = document.getElementById('baseUrl').value;
      
      const statusDiv = document.getElementById('testStatus');
      statusDiv.innerHTML = '<div class="test-status testing">Testing connection...</div>';
      
      try {
        // First save/update the provider if not exists
        const existing = providersData.find(p => p.provider === providerId);
        let testProviderId = existing?.id;
        
        if (!existing) {
          const data = await fetchWithAuth('/api/v1/llm/providers', {
            method: 'POST',
            body: JSON.stringify({
              provider: providerId,
              api_key: apiKey,
              base_url: baseUrl || PROVIDER_CONFIG[providerId].baseUrl,
              enabled: false
            })
          });
          if (data.success) {
            testProviderId = data.data.id;
          }
        }
        
        // Test the connection
        const testData = await fetchWithAuth(`/api/v1/llm/providers/${testProviderId}/test`, {
          method: 'POST'
        });
        
        if (testData.success) {
          statusDiv.innerHTML = '<div class="test-status success">✅ Connection successful!</div>';
        } else {
          statusDiv.innerHTML = `<div class="test-status error">❌ ${testData.error || 'Connection failed'}</div>`;
        }
      } catch (err) {
        statusDiv.innerHTML = `<div class="test-status error">❌ ${err.message}</div>`;
      }
    }

    // Toggle provider
    async function toggleProvider(providerId, enabled) {
      try {
        await fetchWithAuth(`/api/v1/llm/providers/${providerId}`, {
          method: 'PUT',
          body: JSON.stringify({ enabled })
        });
        showToast(`Provider ${enabled ? 'enabled' : 'disabled'}`, 'success');
        loadProviders();
      } catch (err) {
        showToast('Failed to toggle provider: ' + err.message, 'error');
      }
    }

    // Delete provider
    async function deleteProvider(providerId) {
      if (!confirm('Are you sure you want to delete this provider configuration?')) {
        return;
      }
      
      try {
        await fetchWithAuth(`/api/v1/llm/providers/${providerId}`, {
          method: 'DELETE'
        });
        showToast('Provider deleted successfully', 'success');
        loadProviders();
      } catch (err) {
        showToast('Failed to delete provider: ' + err.message, 'error');
      }
    }

    // Load models
    async function loadModels() {
      try {
        const data = await fetchWithAuth('/api/v1/llm/models');
        
        if (data.success) {
          modelsData = data.data || [];
          renderModels();
          document.getElementById('modelsLoading').style.display = 'none';
          document.getElementById('modelsContent').style.display = 'block';
        }
      } catch (err) {
        console.error('Load models error:', err);
        showToast('Failed to load models: ' + err.message, 'error');
        document.getElementById('modelsLoading').innerHTML = 
          `<p style="color: #EF4444;">Error: ${err.message}</p>`;
      }
    }

    // Render models
    function renderModels() {
      const tbody = document.getElementById('modelsTableBody');
      
      // Group by provider
      const grouped = {};
      modelsData.forEach(model => {
        if (!grouped[model.provider]) grouped[model.provider] = [];
        grouped[model.provider].push(model);
      });
      
      let html = '';
      Object.keys(grouped).sort().forEach(provider => {
        const config = PROVIDER_CONFIG[provider] || { icon: '🔷', name: provider };
        const models = grouped[provider];
        
        models.forEach((model, idx) => {
          html += `
            <tr>
              <td>${model.model_name}</td>
              <td>
                ${idx === 0 ? `<span class="provider-group">${config.icon} ${config.name}</span>` : ''}
              </td>
              <td><span class="badge badge-${model.tier || 'free'}">${model.tier || 'free'}</span></td>
              <td>${model.context_window ? model.context_window.toLocaleString() : 'N/A'}</td>
            </tr>
          `;
        });
      });
      
      tbody.innerHTML = html || '<tr><td colspan="4" style="text-align: center; color: #94A3B8;">No models available</td></tr>';
    }

    // Modal helpers
    function openModal(modalId) {
      document.getElementById(modalId).classList.add('show');
    }

    function closeModal(modalId) {
      document.getElementById(modalId).classList.remove('show');
    }

    // Toast notifications
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = message;
      
      if (type === 'error') {
        toast.style.borderColor = '#EF4444';
      } else if (type === 'success') {
        toast.style.borderColor = '#10B981';
      }
      
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      loadProviders();
    });
  </script>
</body>
</html>
