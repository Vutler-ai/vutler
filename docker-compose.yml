services:
  api:
    build: .
    container_name: vutler-api
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - ./uploads:/app/uploads

  sandbox-worker:
    build: .
    container_name: vutler-sandbox-worker
    restart: unless-stopped
    network_mode: host
    env_file: .env
    command: ["node", "workers/sandbox-worker.js"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - api

  frontend:
    build: ./frontend
    container_name: vutler-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://localhost:3001
      - WS_URL=http://localhost:3001
    depends_on:
      - api
