# Vutler Nexus — Docker Compose for Enterprise Deployment
#
# Usage:
#   NEXUS_TOKEN="eyJ..." docker compose up -d
#
# Or with .env file:
#   echo "NEXUS_TOKEN=eyJ..." > .env
#   docker compose up -d

services:
  nexus:
    build: .
    image: vutler/nexus:latest
    container_name: vutler-nexus
    restart: unless-stopped
    environment:
      - NEXUS_TOKEN=${NEXUS_TOKEN}
      - NEXUS_SERVER=${NEXUS_SERVER:-https://app.vutler.ai}
      - NODE_NAME=${NODE_NAME:-nexus-enterprise}
      - NEXUS_TYPE=${NEXUS_TYPE:-docker}
      - NEXUS_PORT=3100
    ports:
      - "3100:3100"
    volumes:
      # Mount client data directory
      - ${CLIENT_DATA_DIR:-./data}:/data
      # Persistent config
      - nexus-config:/home/nexus/.vutler
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  nexus-config:
